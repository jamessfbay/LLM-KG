services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: llm-kg-postgres
    environment:
      POSTGRES_DB: llm_kg
      POSTGRES_USER: llm_kg
      POSTGRES_PASSWORD: llm_kg
    ports:
      - "54329:5432"
    volumes:
      - llm_kg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_kg -d llm_kg"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  llm_kg_pgdata:
