<svg width="1180" height="760" viewBox="0 0 1180 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LLM-KG system architecture</title>
  <desc id="desc">A layered architecture diagram for LLM-KG showing source ingestion, PDF OCR fallback, structured extraction, evidence governance, PostgreSQL pgvector storage, and basic or local query workflows.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #475569; font: 400 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .group-title { fill: #1e293b; font: 700 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .04em; }
      .label { fill: #0f172a; font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 400 12.5px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #475569; font: 400 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .panel { rx: 12; stroke-width: 1.2; }
      .box { fill: white; stroke: #cbd5e1; stroke-width: 1.35; rx: 8; }
      .source-panel { fill: #fff7ed; stroke: #fed7aa; }
      .compile-panel { fill: #eff6ff; stroke: #bfdbfe; }
      .govern-panel { fill: #f0fdf4; stroke: #bbf7d0; }
      .query-panel { fill: #f5f3ff; stroke: #ddd6fe; }
      .quality-panel { fill: #fef2f2; stroke: #fecaca; }
      .source { fill: #fff7ed; stroke: #fdba74; }
      .compile { fill: #eff6ff; stroke: #93c5fd; }
      .govern { fill: #f0fdf4; stroke: #86efac; }
      .query { fill: #f5f3ff; stroke: #c4b5fd; }
      .quality { fill: #fef2f2; stroke: #fca5a5; }
      .line { stroke: #334155; stroke-width: 1.6; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.4; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1180" height="760"/>
  <text class="title" x="44" y="54">LLM-KG System Architecture</text>
  <text class="subtitle" x="44" y="80">Evidence-governed document intelligence: source files become page-cited claims, wiki pages, graph records, and auditable query traces.</text>

  <rect class="panel source-panel" x="40" y="118" width="250" height="500"/>
  <text class="group-title" x="62" y="148">1. SOURCE INGESTION</text>

  <rect class="box source" x="68" y="176" width="194" height="74"/>
  <text class="label" x="90" y="207">Source Files</text>
  <text class="small" x="90" y="230">TXT / MD / DOCX / PDF</text>

  <rect class="box source" x="68" y="284" width="194" height="88"/>
  <text class="label" x="90" y="316">PDF Text Layer</text>
  <text class="small" x="90" y="339">Native pypdf extraction</text>
  <text class="small" x="90" y="360">OpenAI Vision OCR fallback</text>

  <rect class="box source" x="68" y="406" width="194" height="102"/>
  <text class="label" x="90" y="438">Document Contract</text>
  <text class="small" x="90" y="461">id, hash, content, type</text>
  <text class="small" x="90" y="482">page coverage metadata</text>

  <rect class="box source" x="68" y="540" width="194" height="58"/>
  <text class="label" x="90" y="574">Immutable Raw Input</text>

  <rect class="panel compile-panel" x="330" y="118" width="275" height="500"/>
  <text class="group-title" x="352" y="148">2. KNOWLEDGE COMPILATION</text>

  <rect class="box compile" x="365" y="176" width="205" height="88"/>
  <text class="label" x="387" y="208">Prompt Layer</text>
  <text class="small" x="387" y="231">config/prompts/*.md</text>
  <text class="small" x="387" y="252">planning-oriented extraction</text>

  <rect class="box compile" x="365" y="302" width="205" height="102"/>
  <text class="label" x="387" y="334">LLM Provider</text>
  <text class="small" x="387" y="357">Mock for offline tests</text>
  <text class="small" x="387" y="378">OpenAI Structured Outputs</text>

  <rect class="box compile" x="365" y="442" width="205" height="98"/>
  <text class="label" x="387" y="474">Extraction Output</text>
  <text class="small" x="387" y="497">Claims + evidence quotes</text>
  <text class="small" x="387" y="518">Entities + typed relations</text>

  <rect class="box compile" x="365" y="562" width="205" height="58"/>
  <text class="label" x="387" y="596">LLM Wiki Compiler</text>

  <rect class="panel govern-panel" x="645" y="118" width="255" height="500"/>
  <text class="group-title" x="667" y="148">3. GOVERNED STORAGE</text>

  <rect class="box govern" x="675" y="176" width="195" height="92"/>
  <text class="label" x="697" y="208">Governance Gate</text>
  <text class="small" x="697" y="231">No evidence, no claim</text>
  <text class="small" x="697" y="252">No source trace, no relation</text>

  <rect class="box govern" x="675" y="302" width="195" height="82"/>
  <text class="label" x="697" y="334">Ontology + Proposals</text>
  <text class="small" x="697" y="357">generic schema validation</text>
  <text class="small" x="697" y="378">pending review drafts</text>

  <rect class="box govern" x="675" y="418" width="195" height="82"/>
  <text class="label" x="697" y="450">Postgres + pgvector</text>
  <text class="small" x="697" y="473">text units, embeddings</text>
  <text class="small" x="697" y="494">claims, entities, relations</text>

  <rect class="box govern" x="675" y="534" width="195" height="82"/>
  <text class="label" x="697" y="566">Human Exports</text>
  <text class="small" x="697" y="589">Markdown wiki</text>
  <text class="small" x="697" y="610">JSONL graph store</text>

  <rect class="panel query-panel" x="940" y="118" width="200" height="500"/>
  <text class="group-title" x="962" y="148">4. QUERY + OPERATIONS</text>

  <rect class="box query" x="965" y="176" width="165" height="76"/>
  <text class="label" x="987" y="208">CLI / API</text>
  <text class="small" x="987" y="231">user or agent calls</text>

  <rect class="box query" x="965" y="286" width="165" height="88"/>
  <text class="label" x="987" y="318">Retrieval Modes</text>
  <text class="small" x="987" y="341">basic vector RAG</text>
  <text class="small" x="987" y="362">local entity-aware KG</text>

  <rect class="box query" x="965" y="408" width="165" height="88"/>
  <text class="label" x="987" y="440">Verify + Trace</text>
  <text class="small" x="987" y="463">claim/relation evidence</text>
  <text class="small" x="987" y="484">reasoning trace records</text>

  <rect class="box query" x="965" y="530" width="165" height="88"/>
  <text class="label" x="987" y="562">Lint + Stats</text>
  <text class="small" x="987" y="585">coverage, citations</text>
  <text class="small" x="987" y="606">audit, apply-plan</text>

  <rect class="panel quality-panel" x="330" y="650" width="810" height="72"/>
  <text class="group-title" x="352" y="679">ACCURACY AND MAINTENANCE LOOP</text>
  <text class="small" x="352" y="702">Track PDF page coverage, OCR fallback count, claims with evidence/page numbers, noisy entity ratio, relation validity, broken links, and audit events.</text>

  <path class="line" d="M165 250 V278"/>
  <path class="line" d="M165 372 V400"/>
  <path class="line" d="M165 508 V534"/>
  <path class="line" d="M262 457 H359"/>

  <path class="line" d="M467 264 V296"/>
  <path class="line" d="M467 404 V436"/>
  <path class="line" d="M467 540 V556"/>
  <path class="line" d="M570 491 H669"/>

  <path class="line" d="M772 268 V296"/>
  <path class="line" d="M772 384 V412"/>
  <path class="line" d="M772 500 V528"/>
  <path class="line" d="M870 459 H959"/>

  <path class="line" d="M1047 252 V280"/>
  <path class="line" d="M1047 374 V402"/>
  <path class="line" d="M1047 496 V524"/>

  <path class="dash" d="M772 616 V644"/>
  <path class="dash" d="M1047 618 V644"/>
  <path class="dash" d="M467 620 V644"/>

  <text class="tiny" x="302" y="443">page-aware text</text>
  <text class="tiny" x="612" y="475">validated records</text>
  <text class="tiny" x="904" y="445">retrieval context</text>
</svg>
